name: Generar Documentacion

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codigo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar pdoc
      run: |
        python -m pip install --upgrade pip
        pip install pdoc

    - name: Crear carpetas
      run: mkdir -p docs/html docs/markdown

    - name: Generar HTML
      run: pdoc -o docs/html src/geometria.py

    - name: Subir artefacto
      uses: actions/upload-artifact@v4
      with:
        name: documentacion-html
        path: docs/html/

